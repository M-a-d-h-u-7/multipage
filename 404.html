<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting — AURUM</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --gold:#c9a84c; --black:#0a0a0a; --white:#f5f0e8; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:var(--black); color:var(--white);
      font-family:'Montserrat',sans-serif;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      height:100vh; text-align:center; gap:1.5rem;
    }
    .logo { font-family:'Cormorant Garamond',serif; font-size:2.5rem; color:var(--gold); letter-spacing:0.3em; }
    h1 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:300; }
    p { font-size:0.75rem; color:#888; letter-spacing:0.1em; }
    .links { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; margin-top:1rem; }
    a {
      color:var(--black); background:var(--gold);
      padding:0.7rem 1.5rem; text-decoration:none;
      font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; font-weight:600;
      transition:opacity 0.2s;
    }
    a:hover { opacity:0.85; }
    a.outline { background:transparent; color:var(--gold); border:1px solid var(--gold); }
    .spinner { width:40px; height:40px; border:2px solid rgba(201,168,76,0.2); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #countdown { font-size:0.7rem; color:var(--gold); }
  </style>
  <script>
    // GitHub Pages SPA redirect trick
    // Detect which page was requested and redirect correctly
    (function() {
      var path = window.location.pathname;
      var seg = path.split('/').pop();
      var pages = ['shop','product','cart','about','contact','index'];
      
      // Try to find the matching page
      for (var p of pages) {
        if (path.indexOf(p) > -1) {
          window.location.replace(p + '.html');
          return;
        }
      }
      // Default: go home after 3s
    })();
  </script>
</head>
<body>
  <div class="spinner"></div>
  <div class="logo">AURUM</div>
  <h1>Redirecting you...</h1>
  <p id="countdown">Taking you to the right page in <span id="sec">3</span>s</p>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="shop.html" class="outline">Collection</a>
    <a href="cart.html" class="outline">Cart</a>
    <a href="contact.html" class="outline">Contact</a>
  </div>
  <script>
    var s = 3;
    var t = setInterval(function() {
      s--;
      document.getElementById('sec').textContent = s;
      if (s <= 0) {
        clearInterval(t);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>
</body>
</html>
